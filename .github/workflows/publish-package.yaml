name: Publish package

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: |
          dotnet pack Zarn/Zarn.csproj --no-restore /p:TreatWarningsAsErrors=true
          dotnet pack Zarn.AspNetCore/Zarn.AspNetCore.csproj --no-restore /p:TreatWarningsAsErrors=true

      - name: Publish
        run:
          dotnet nuget push artifacts/packages/* \
            --skip-duplicate \
            --api-key "${{ secrets.NUGET_API_KEY }}"
